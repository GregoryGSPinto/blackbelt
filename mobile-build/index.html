<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d0d1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BlackBelt</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d1a;
        --card: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: rgba(248, 250, 252, 0.72);
        --accent: #f59e0b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 32%),
          linear-gradient(180deg, #151526 0%, var(--bg) 100%);
        color: var(--text);
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 420px);
        border-radius: 24px;
        padding: 32px 24px;
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px);
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        margin-bottom: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .spinner {
        width: 32px;
        height: 32px;
        margin: 24px auto 0;
        border-radius: 999px;
        border: 3px solid rgba(255, 255, 255, 0.16);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }
      .actions {
        display: none;
        margin-top: 24px;
        gap: 12px;
      }
      .actions[data-visible="true"] {
        display: grid;
      }
      .button {
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid rgba(245, 158, 11, 0.24);
        background: rgba(245, 158, 11, 0.14);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
      }
      .footnote {
        margin-top: 18px;
        font-size: 12px;
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation: none; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-live="polite">
        <img class="logo" src="/icon-192.png" alt="BlackBelt" />
        <h1>Abrindo BlackBelt</h1>
        <p id="status">
          Preparando a experiência mobile com a versão mais recente do aplicativo.
        </p>
        <div class="spinner" aria-hidden="true"></div>
        <div class="actions" id="offline-actions">
          <button class="button" id="retry-button" type="button">Tentar novamente</button>
        </div>
        <p class="footnote">Build 7mRLPk1wwTqQdIyewzZxl</p>
      </section>
    </main>
    <script>
      (() => {
        const appUrl = "https://blackbelt.app";
        const status = document.getElementById('status');
        const offlineActions = document.getElementById('offline-actions');
        const retryButton = document.getElementById('retry-button');
        const redirect = () => window.location.replace(appUrl);
        const showOffline = () => {
          status.textContent = 'Sem conexão. Conecte-se à internet para continuar no aplicativo.';
          offlineActions.dataset.visible = 'true';
        };
        retryButton?.addEventListener('click', () => {
          status.textContent = 'Tentando reconectar...';
          offlineActions.dataset.visible = 'false';
          if (navigator.onLine) {
            redirect();
            return;
          }
          window.setTimeout(showOffline, 600);
        });
        if (navigator.onLine) {
          window.setTimeout(redirect, 350);
        } else {
          showOffline();
        }
      })();
    </script>
  </body>
</html>
